<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" font-family="Inter,Arial,sans-serif">
  <rect width="1100" height="360" fill="#0B1220"/>
  <text x="40" y="56" font-size="26" font-weight="800" fill="#F8FAFC">El semáforo: qué tan ganador es un producto</text>
  <g>
    <rect x="40" y="90" width="250" height="220" rx="14" fill="#111827" stroke="#7F1D1D"/>
    <text x="60" y="140" font-size="40">🔴</text>
    <text x="115" y="135" font-size="22" font-weight="800" fill="#FCA5A5">LANZAR</text>
    <text x="60" y="185" font-size="15" fill="#CBD5E1">Señal muy fuerte.</text>
    <text x="60" y="210" font-size="15" fill="#CBD5E1">Vale la pena lanzarlo</text>
    <text x="60" y="232" font-size="15" fill="#CBD5E1">ya mismo.</text>
  </g>
  <g>
    <rect x="310" y="90" width="250" height="220" rx="14" fill="#111827" stroke="#854D0E"/>
    <text x="330" y="140" font-size="40">🟡</text>
    <text x="385" y="135" font-size="22" font-weight="800" fill="#FDE68A">CONSIDERAR</text>
    <text x="330" y="185" font-size="15" fill="#CBD5E1">Buena señal.</text>
    <text x="330" y="210" font-size="15" fill="#CBD5E1">Míralo de cerca antes</text>
    <text x="330" y="232" font-size="15" fill="#CBD5E1">de decidir.</text>
  </g>
  <g>
    <rect x="580" y="90" width="250" height="220" rx="14" fill="#111827" stroke="#14532D"/>
    <text x="600" y="140" font-size="40">🟢</text>
    <text x="655" y="135" font-size="22" font-weight="800" fill="#86EFAC">MONITOREAR</text>
    <text x="600" y="185" font-size="15" fill="#CBD5E1">Señal temprana.</text>
    <text x="600" y="210" font-size="15" fill="#CBD5E1">Vigílalo, todavía</text>
    <text x="600" y="232" font-size="15" fill="#CBD5E1">es pronto.</text>
  </g>
  <g>
    <rect x="850" y="90" width="210" height="220" rx="14" fill="#111827" stroke="#374151"/>
    <text x="870" y="140" font-size="40">⚪</text>
    <text x="925" y="135" font-size="22" font-weight="800" fill="#CBD5E1">SATURADO</text>
    <text x="870" y="185" font-size="15" fill="#CBD5E1">Lleva demasiado</text>
    <text x="870" y="210" font-size="15" fill="#CBD5E1">tiempo. El mercado</text>
    <text x="870" y="232" font-size="15" fill="#CBD5E1">puede estar lleno.</text>
  </g>
  <text x="40" y="345" font-size="15" fill="#94A3B8">El color sale solo, automáticamente, según el “Winner Score” y los días que lleva activo el anuncio.</text>
</svg>
