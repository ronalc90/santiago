<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="Inter,Arial,sans-serif">
  <rect width="1200" height="320" fill="#0B1220"/>
  <text x="40" y="48" font-size="24" font-weight="800" fill="#F8FAFC">Crear una landing en 3 pasos</text>
  <g>
    <rect x="40" y="80" width="330" height="190" rx="14" fill="#111827" stroke="#1F2937"/>
    <circle cx="72" cy="118" r="18" fill="#38BDF8"/><text x="66" y="124" font-size="18" font-weight="800" fill="#082F49">1</text>
    <text x="104" y="124" font-size="19" font-weight="700" fill="#F8FAFC">Datos del producto</text>
    <text x="64" y="162" font-size="14" fill="#CBD5E1">Nombre, precio oferta y normal,</text>
    <text x="64" y="184" font-size="14" fill="#CBD5E1">público y ángulo de venta.</text>
    <rect x="64" y="206" width="280" height="40" rx="8" fill="#0EA5E9" opacity="0.15" stroke="#0EA5E9"/>
    <text x="80" y="231" font-size="14" fill="#7DD3FC">✨ Botón “Autocompletar con IA”</text>
  </g>
  <text x="388" y="185" font-size="30" fill="#475569">→</text>
  <g>
    <rect x="430" y="80" width="330" height="190" rx="14" fill="#111827" stroke="#1F2937"/>
    <circle cx="462" cy="118" r="18" fill="#38BDF8"/><text x="456" y="124" font-size="18" font-weight="800" fill="#082F49">2</text>
    <text x="494" y="124" font-size="19" font-weight="700" fill="#F8FAFC">Estilo e imágenes</text>
    <text x="454" y="162" font-size="14" fill="#CBD5E1">Sube (opcional) una foto del</text>
    <text x="454" y="184" font-size="14" fill="#CBD5E1">producto y una de referencia.</text>
    <rect x="454" y="206" width="280" height="40" rx="8" fill="#1E293B"/>
    <text x="470" y="231" font-size="14" fill="#E2E8F0">🔘 Compliance TikTok (opcional)</text>
  </g>
  <text x="778" y="185" font-size="30" fill="#475569">→</text>
  <g>
    <rect x="820" y="80" width="340" height="190" rx="14" fill="#111827" stroke="#1F2937"/>
    <circle cx="852" cy="118" r="18" fill="#38BDF8"/><text x="846" y="124" font-size="18" font-weight="800" fill="#082F49">3</text>
    <text x="884" y="124" font-size="19" font-weight="700" fill="#F8FAFC">Revisar y generar</text>
    <text x="844" y="162" font-size="14" fill="#CBD5E1">Revisas el resumen y pulsas…</text>
    <rect x="844" y="184" width="290" height="44" rx="10" fill="#38BDF8"/>
    <text x="864" y="212" font-size="16" font-weight="700" fill="#082F49">✨ Generar 9 imágenes</text>
  </g>
  <text x="40" y="305" font-size="14" fill="#94A3B8">Tarda 1–2 minutos. Verás una barra de progreso y luego las 9 imágenes listas para descargar.</text>
</svg>
